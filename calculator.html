<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <form>
        Number 1:
        <input type="text" id="num1">
        <br><br>

        Number 2:
        <input type="text" id="num2">
        <br><br>

        Result:
        <input type="text" id="result">
        <br><br>

        <button type="button" onclick="Add()">ADD</button>
        <button type="button" onclick="Subtract()">SUB</button>
        <button type="button" onclick="Multiply()">MUL</button>
        <button type="button" onclick="Divide()">DIV</button>
    </form>
    <script>
        function Add() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            document.getElementById("result").value = Number(n1) + Number(n2);
        }

        function Subtract() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            document.getElementById("result").value = Number(n1) - Number(n2);
        }

        function Multiply() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;
            document.getElementById("result").value = Number(n1) * Number(n2);
        }

        function Divide() {
            var n1 = document.getElementById("num1").value;
            var n2 = document.getElementById("num2").value;

            if (Number(n2) === 0) {
                document.getElementById("result").value = "Cannot divide by 0";
            } else {
                document.getElementById("result").value = Number(n1) / Number(n2);
            }
        }
    </script>

</body>
</html>
